<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чудинова Анастасия</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      color: #2b1f18;
      background: #d8c1a7;
    }

    .page {
      min-height: 112vh;
      padding: 18px 16px 34px;
      background:
        radial-gradient(circle at 24% 10%, rgba(255, 243, 224, 0.7), transparent 34%),
        linear-gradient(180deg, #d7bea2 0%, #c6a17e 48%, #8c6247 100%);
    }

    .shell {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      min-height: 520px;
      overflow: hidden;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(60, 39, 27, 0.02) 0%, rgba(60, 39, 27, 0.1) 54%, rgba(60, 39, 27, 0.44) 100%),
        url("tempImagegckxIU.jpg") center top / cover no-repeat;
      box-shadow: 0 24px 60px rgba(64, 37, 22, 0.28);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 235, 207, 0.08), transparent 42%),
        radial-gradient(circle at 50% 18%, transparent 0 28%, rgba(57, 33, 20, 0.08) 54%, rgba(57, 33, 20, 0.34) 100%);
    }

    .content {
      position: relative;
      z-index: 2;
      margin-top: -76px;
      padding: 0 4px;
    }

    .intro {
      padding: 26px 22px 22px;
      border-radius: 30px;
      background: rgba(246, 228, 205, 0.9);
      box-shadow:
        0 18px 42px rgba(64, 37, 22, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .name {
      margin: 0;
      color: #2d211a;
      font-size: clamp(34px, 9vw, 48px);
      line-height: 0.96;
      font-weight: 600;
      letter-spacing: -0.065em;
    }

    .subtitle {
      margin: 16px 0 0;
      color: rgba(45, 33, 26, 0.7);
      font-size: clamp(18px, 4.8vw, 24px);
      line-height: 1.22;
      font-weight: 600;
      letter-spacing: -0.035em;
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .button {
      display: block;
      padding: 19px 20px;
      border-radius: 24px;
      color: #f9ecdc;
      text-decoration: none;
      background: linear-gradient(145deg, #4d3324, #2f2019);
      box-shadow:
        0 14px 28px rgba(58, 33, 20, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      background: linear-gradient(145deg, #5a3a28, #332119);
      box-shadow:
        0 18px 34px rgba(58, 33, 20, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
    }

    .button-title {
      display: block;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 650;
      letter-spacing: -0.045em;
    }

    .button-subtitle {
      display: block;
      margin-top: 7px;
      color: rgba(249, 236, 220, 0.68);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .syntx-note {
      margin: 4px 2px 0;
      color: rgba(43, 31, 24, 0.72);
      font-size: 15px;
      line-height: 1.4;
      font-weight: 650;
      letter-spacing: -0.015em;
    }

    .collab {
      margin-top: 18px;
      padding: 20px;
      border-radius: 28px;
      background: rgba(255, 241, 222, 0.54);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.34);
    }

    .collab-title {
      margin: 0 0 12px;
      color: rgba(43, 31, 24, 0.58);
      font-size: 13px;
      line-height: 1.2;
      font-weight: 750;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .telegram {
      text-align: center;
      color: #2b1f18;
      background: linear-gradient(145deg, #fff0dc, #e7c6a6);
      box-shadow:
        0 14px 28px rgba(58, 33, 20, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }

    .telegram:hover {
      background: linear-gradient(145deg, #fff5e7, #edcfaf);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 26px 4px 0;
      color: rgba(255, 238, 218, 0.78);
      font-size: 13px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 520px) {
      .page {
        min-height: 116vh;
        padding: 14px 12px 30px;
      }

      .hero {
        min-height: 500px;
        border-radius: 30px;
        background-position: center top;
      }

      .content {
        margin-top: -64px;
      }

      .intro {
        padding: 24px 18px 20px;
        border-radius: 28px;
      }

      .button {
        padding: 18px 18px;
        border-radius: 22px;
      }

      .collab {
        padding: 18px;
        border-radius: 26px;
      }
    }

    @media (max-width: 380px) {
      .hero {
        min-height: 470px;
      }

      .content {
        margin-top: -54px;
      }

      .footer {
        font-size: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .button {
        transition: none;
      }

      .button:hover {
        transform: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="shell">
      <section class="hero" aria-label="Фото Чудиновой Анастасии"></section>

      <section class="content" aria-label="Ссылки Чудиновой Анастасии">
        <div class="intro">
          <h1 class="name">Чудинова Анастасия</h1>

          <p class="subtitle">
            AI-режиссёр<br />
            выбери, куда тебе
          </p>
        </div>

        <div class="links">
          <a class="button" href="https://t.me/chillaiai" target="_blank" rel="noopener noreferrer">
            <span class="button-title">Нейро без истерик</span>
            <span class="button-subtitle">AI-контент Telegram</span>
          </a>

          <p class="syntx-note">Работаю с нейросетями здесь:</p>

          <a class="button" href="https://syntx.ai/welcome/QNEO5ZuV" target="_blank" rel="noopener noreferrer">
            <span class="button-title">Syntx AI</span>
            <span class="button-subtitle">15% скидка по промокоду DONEURO</span>
          </a>
        </div>

        <div class="collab">
          <p class="collab-title">Предложить сотрудничество</p>

          <a class="button telegram" href="https://t.me/makemenastya" target="_blank" rel="noopener noreferrer">
            <span class="button-title">Написать мне в Telegram</span>
          </a>
        </div>

        <footer class="footer">
          <span>Екатеринбург</span>
          <span>anastasy.chu</span>
        </footer>
      </section>
    </div>
  </main>
</body>
</html>
