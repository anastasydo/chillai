<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чудинова Анастасия</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      color: #f5f1ea;
      background: #030405;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 32px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: -28px;
      z-index: -3;
      background:
        linear-gradient(180deg, rgba(3, 4, 5, 0.08), rgba(3, 4, 5, 0.72)),
        linear-gradient(90deg, rgba(3, 4, 5, 0.66), rgba(3, 4, 5, 0.22), rgba(3, 4, 5, 0.76)),
        url("tempImagegckxIU.jpg") center / cover no-repeat;
      filter: saturate(0.95) contrast(1.08) brightness(0.88);
      transform: scale(1.04);
      animation: cinematicBreath 14s ease-in-out infinite alternate;
      will-change: transform, filter;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 44% 30%, rgba(255, 255, 255, 0.1), transparent 24%),
        radial-gradient(circle at 74% 62%, rgba(72, 112, 152, 0.14), transparent 30%),
        radial-gradient(circle at center, transparent 40%, rgba(0, 0, 0, 0.76) 100%);
      opacity: 0.72;
    }

    .film-grain {
      position: absolute;
      inset: -100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.11;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.75) 0 1px, transparent 1px),
        radial-gradient(circle, rgba(0, 0, 0, 0.9) 0 1px, transparent 1px);
      background-size: 3px 3px, 5px 5px;
      background-position: 0 0, 2px 2px;
      animation: grainMove 0.7s steps(2) infinite;
    }

    .card {
      width: 100%;
      max-width: 430px;
      padding: 28px 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 32px;
      background: linear-gradient(
        145deg,
        rgba(20, 21, 24, 0.58),
        rgba(5, 6, 8, 0.5)
      );
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.48),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: cardAppear 900ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .name {
      margin: 0 0 16px;
      font-size: clamp(30px, 7vw, 44px);
      line-height: 1.05;
      font-weight: 500;
      letter-spacing: -0.055em;
    }

    .subtitle {
      margin: 0 0 34px;
      color: rgba(245, 241, 234, 0.72);
      font-size: clamp(17px, 4.2vw, 24px);
      line-height: 1.3;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .button {
      position: relative;
      display: block;
      overflow: hidden;
      padding: 18px 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 22px;
      color: #f5f1ea;
      text-decoration: none;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.11),
        rgba(255, 255, 255, 0.06)
      );
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition:
        transform 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        110deg,
        transparent,
        rgba(255, 255, 255, 0.16),
        transparent
      );
      transform: skewX(-18deg);
      transition: left 0.7s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.3);
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.15),
        rgba(255, 255, 255, 0.08)
      );
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .button:hover::before {
      left: 130%;
    }

    .button-title {
      position: relative;
      z-index: 1;
      display: block;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    .button-subtitle {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 7px;
      color: rgba(245, 241, 234, 0.62);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .syntx-block {
      display: grid;
      gap: 10px;
    }

    .syntx-note {
      margin: 6px 0 0;
      color: rgba(245, 241, 234, 0.7);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 600;
    }

    .collab {
      margin-top: 30px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.14);
    }

    .collab-title {
      margin: 0 0 16px;
      color: rgba(245, 241, 234, 0.62);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .telegram {
      padding: 20px 18px;
      text-align: center;
      color: #070809;
      background: #f5f1ea;
      border-color: #f5f1ea;
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .telegram:hover {
      color: #070809;
      background: #ffffff;
      border-color: #ffffff;
    }

    .telegram .button-title {
      font-size: 22px;
      letter-spacing: -0.045em;
    }

    @keyframes cinematicBreath {
      from {
        transform: scale(1.04) translate3d(0, 0, 0);
        filter: saturate(0.93) contrast(1.06) brightness(0.84);
      }

      to {
        transform: scale(1.075) translate3d(-10px, -8px, 0);
        filter: saturate(1) contrast(1.12) brightness(0.9);
      }
    }

    @keyframes grainMove {
      0% {
        transform: translate3d(0, 0, 0);
      }

      25% {
        transform: translate3d(-3%, 2%, 0);
      }

      50% {
        transform: translate3d(2%, -4%, 0);
      }

      75% {
        transform: translate3d(-1%, 3%, 0);
      }

      100% {
        transform: translate3d(4%, -2%, 0);
      }
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @media (max-width: 520px) {
      .page {
        align-items: flex-end;
        padding: 24px 14px;
      }

      .page::before {
        background:
          linear-gradient(180deg, rgba(3, 4, 5, 0.04), rgba(3, 4, 5, 0.78)),
          linear-gradient(90deg, rgba(3, 4, 5, 0.46), rgba(3, 4, 5, 0.16), rgba(3, 4, 5, 0.58)),
          url("tempImagegckxIU.jpg") 54% center / cover no-repeat;
      }

      .card {
        padding: 26px 18px;
        border-radius: 30px;
      }

      .button {
        border-radius: 21px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .page::before,
      .film-grain,
      .card {
        animation: none;
      }

      .button::before {
        display: none;
      }

      .button {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="film-grain"></div>

    <section class="card" aria-label="Ссылки Чудиновой Анастасии">
      <h1 class="name">Чудинова Анастасия</h1>

      <p class="subtitle">
        AI-режиссёр<br />
        выбери, куда тебе
      </p>

      <div class="links">
        <a class="button" href="https://t.me/chillaiai" target="_blank" rel="noopener noreferrer">
          <span class="button-title">Нейро без истерик</span>
          <span class="button-subtitle">AI-контент Telegram</span>
        </a>

        <div class="syntx-block">
          <p class="syntx-note">Работаю с нейросетями здесь:</p>

          <a class="button" href="https://syntx.ai/welcome/QNEO5ZuV" target="_blank" rel="noopener noreferrer">
            <span class="button-title">Syntx AI</span>
            <span class="button-subtitle">15% скидка по промокоду DONEURO</span>
          </a>
        </div>
      </div>

      <div class="collab">
        <p class="collab-title">Предложить сотрудничество</p>

        <a class="button telegram" href="https://t.me/makemenastya" target="_blank" rel="noopener noreferrer">
          <span class="button-title">Написать мне в Telegram</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
