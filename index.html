<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#120706" />
  <title>Чудинова Анастасия</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #120706;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      color: #f5f1ea;
      background: #120706;
    }

    .page {
      position: relative;
      min-height: 100svh;
      padding: 59svh 16px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 26%, rgba(75, 24, 12, 0.32), transparent 43%),
        linear-gradient(180deg, #1b0905 0%, #120706 42%, #070302 100%);
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -8;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 24%, rgba(120, 38, 15, 0.28), transparent 39%),
        linear-gradient(
          180deg,
          rgba(28, 10, 6, 0.28) 0%,
          rgba(18, 7, 5, 0.22) 38%,
          rgba(7, 3, 2, 0.96) 100%
        );
    }

    .hero-backdrop {
      position: absolute;
      inset: -8%;
      z-index: -7;
      pointer-events: none;
      background-image: url("photo.jpg");
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      filter: blur(22px) saturate(1.08) contrast(1.05) brightness(0.58);
      transform: scale(1.08);
      transform-origin: center top;
      opacity: 0.92;
    }

    .hero-photo {
      position: absolute;
      inset: -6% -18% -8%;
      z-index: -5;
      pointer-events: none;
      background-image: url("photo.jpg");
      background-position: 53% 5svh;
      background-size: auto 92svh;
      background-repeat: no-repeat;
      filter: saturate(1.04) contrast(1.04) brightness(0.94);
      -webkit-mask-image:
        linear-gradient(
          90deg,
          transparent 0%,
          rgba(0, 0, 0, 0.08) 12%,
          rgba(0, 0, 0, 0.55) 24%,
          #000 38%,
          #000 62%,
          rgba(0, 0, 0, 0.55) 76%,
          rgba(0, 0, 0, 0.08) 88%,
          transparent 100%
        ),
        linear-gradient(
          180deg,
          transparent 0%,
          rgba(0, 0, 0, 0.45) 4%,
          #000 12%,
          #000 70%,
          rgba(0, 0, 0, 0.72) 82%,
          rgba(0, 0, 0, 0.22) 94%,
          transparent 100%
        );
      mask-image:
        linear-gradient(
          90deg,
          transparent 0%,
          rgba(0, 0, 0, 0.08) 12%,
          rgba(0, 0, 0, 0.55) 24%,
          #000 38%,
          #000 62%,
          rgba(0, 0, 0, 0.55) 76%,
          rgba(0, 0, 0, 0.08) 88%,
          transparent 100%
        ),
        linear-gradient(
          180deg,
          transparent 0%,
          rgba(0, 0, 0, 0.45) 4%,
          #000 12%,
          #000 70%,
          rgba(0, 0, 0, 0.72) 82%,
          rgba(0, 0, 0, 0.22) 94%,
          transparent 100%
        );
      -webkit-mask-composite: source-in;
      mask-composite: intersect;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      background:
        linear-gradient(
          90deg,
          rgba(7, 3, 2, 1) 0%,
          rgba(7, 3, 2, 0.94) 9%,
          rgba(7, 3, 2, 0.55) 22%,
          rgba(7, 3, 2, 0.12) 38%,
          rgba(7, 3, 2, 0.12) 62%,
          rgba(7, 3, 2, 0.55) 78%,
          rgba(7, 3, 2, 0.94) 91%,
          rgba(7, 3, 2, 1) 100%
        ),
        linear-gradient(
          180deg,
          rgba(12, 5, 4, 0.18) 0%,
          rgba(12, 5, 4, 0.04) 28%,
          rgba(10, 4, 3, 0.24) 52%,
          rgba(7, 3, 2, 0.96) 92%,
          rgba(7, 3, 2, 1) 100%
        ),
        radial-gradient(circle at 51% 31%, rgba(255, 218, 184, 0.1), transparent 23%);
    }

    .film-grain {
      position: absolute;
      inset: -40%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.16;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 320 320' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.12' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='320' height='320' filter='url(%23n)' opacity='0.7'/%3E%3C/svg%3E");
      background-size: 124px 124px;
      mix-blend-mode: overlay;
      animation: grainMove 900ms steps(2) infinite;
    }

    .soft-vignette {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(
          ellipse at 50% 32%,
          transparent 0%,
          transparent 34%,
          rgba(8, 4, 3, 0.34) 64%,
          rgba(8, 4, 3, 0.78) 100%
        ),
        linear-gradient(
          180deg,
          rgba(20, 8, 5, 0) 0%,
          rgba(20, 8, 5, 0.06) 34%,
          rgba(7, 3, 2, 0.78) 100%
        );
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      padding: 20px 18px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      background: linear-gradient(
        145deg,
        rgba(17, 9, 7, 0.58),
        rgba(8, 5, 5, 0.5)
      );
      backdrop-filter: blur(14px) saturate(0.92);
      -webkit-backdrop-filter: blur(14px) saturate(0.92);
      box-shadow:
        0 24px 78px rgba(0, 0, 0, 0.46),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: cardAppear 900ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .name {
      margin: 0 0 10px;
      font-size: clamp(28px, 6.1vw, 39px);
      line-height: 1.06;
      font-weight: 500;
      letter-spacing: -0.055em;
    }

    .subtitle {
      margin: 0 0 20px;
      color: rgba(245, 241, 234, 0.74);
      font-size: clamp(16px, 3.8vw, 21px);
      line-height: 1.3;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .links {
      display: grid;
      gap: 10px;
    }

    .button {
      position: relative;
      display: block;
      overflow: hidden;
      padding: 15px 16px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 20px;
      color: #f5f1ea;
      text-decoration: none;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.085),
        rgba(255, 255, 255, 0.035)
      );
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 10px 24px rgba(0, 0, 0, 0.12);
      transition:
        transform 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        110deg,
        transparent,
        rgba(255, 255, 255, 0.1),
        transparent
      );
      transform: skewX(-18deg);
      transition: left 0.7s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.23);
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.12),
        rgba(255, 255, 255, 0.055)
      );
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }

    .button:hover::before {
      left: 130%;
    }

    .button-title {
      position: relative;
      z-index: 1;
      display: block;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    .button-subtitle {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 6px;
      color: rgba(245, 241, 234, 0.6);
      font-size: 11px;
      line-height: 1.35;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .syntx-block {
      display: grid;
      gap: 9px;
      margin-top: 1px;
    }

    .syntx-note {
      margin: 3px 0 0;
      color: rgba(245, 241, 234, 0.62);
      font-size: 14px;
      line-height: 1.4;
      font-weight: 600;
    }

    .collab {
      margin-top: 21px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .collab-title {
      margin: 0 0 12px;
      color: rgba(245, 241, 234, 0.62);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.075em;
      text-transform: uppercase;
    }

    .telegram {
      padding: 17px 16px;
      text-align: center;
      color: #1b100c;
      background: rgba(245, 241, 234, 0.94);
      border-color: rgba(245, 241, 234, 0.9);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .telegram:hover {
      color: #140c09;
      background: #ffffff;
      border-color: #ffffff;
    }

    .telegram .button-title {
      font-size: 20px;
      letter-spacing: -0.045em;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 18px;
      color: rgba(245, 241, 234, 0.46);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes grainMove {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(-3%, 2%);
      }

      50% {
        transform: translate(2%, -3%);
      }

      75% {
        transform: translate(3%, 3%);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    @media (max-width: 520px) {
      .page {
        min-height: 100svh;
        padding: 59svh 14px 16px;
      }

      .hero-backdrop {
        inset: -10%;
        background-position: center top;
        filter: blur(24px) saturate(1.08) contrast(1.05) brightness(0.56);
        transform: scale(1.1);
      }

      .hero-photo {
        inset: -6% -20% -8%;
        background-position: 53% 5svh;
        background-size: auto 90svh;
        filter: saturate(1.04) contrast(1.04) brightness(0.95);
      }

      .film-grain {
        opacity: 0.18;
        background-size: 114px 114px;
      }

      .card {
        padding: 20px 18px 16px;
        border-radius: 30px;
      }

      .name {
        font-size: clamp(28px, 6.4vw, 36px);
      }

      .subtitle {
        margin-bottom: 20px;
      }

      .button {
        padding: 15px 16px;
        border-radius: 20px;
      }

      .button-title {
        font-size: 18px;
      }

      .button-subtitle {
        font-size: 11px;
        letter-spacing: 0.075em;
      }
    }

    @media (max-width: 390px) {
      .page {
        padding-top: 60svh;
      }

      .hero-photo {
        background-position: 54% 5svh;
        background-size: auto 88svh;
      }

      .name {
        font-size: 29px;
      }

      .subtitle {
        font-size: 16px;
        margin-bottom: 19px;
      }

      .button-title {
        font-size: 17px;
      }

      .telegram .button-title {
        font-size: 19px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .film-grain {
        animation: none;
      }

      .button::before {
        display: none;
      }

      .button {
        transition: none;
      }
    }
  </style>

</head>

<body>
  <main class="page">
    <div class="hero-backdrop"></div>
    <div class="hero-photo"></div>
    <div class="film-grain"></div>
    <div class="soft-vignette"></div>
