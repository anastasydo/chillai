<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чудинова Анастасия</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      color: #f5f1ea;
      background: #170b08;
    }

    .page {
      position: relative;
      min-height: 100svh;
      padding: 61svh 16px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
      background: #170b08;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -6;
      pointer-events: none;
      background:
        linear-gradient(
          180deg,
          rgba(28, 10, 6, 0.16) 0%,
          rgba(39, 14, 8, 0.18) 28%,
          rgba(23, 9, 6, 0.58) 66%,
          rgba(9, 5, 4, 0.98) 100%
        ),
        radial-gradient(circle at 50% 32%, rgba(255, 174, 122, 0.15), transparent 36%),
        #170b08;
    }

    .hero-photo {
      position: absolute;
      inset: -2%;
      z-index: -5;
      pointer-events: none;
      background: url("photo.jpg") 53% 5svh / auto 91svh no-repeat;
      filter: saturate(0.98) contrast(1.03) brightness(0.84);
      transform: scale(1);
      -webkit-mask-image: radial-gradient(
        circle at 52% 36%,
        rgba(0, 0, 0, 1) 28%,
        rgba(0, 0, 0, 0.95) 48%,
        rgba(0, 0, 0, 0.7) 68%,
        rgba(0, 0, 0, 0.28) 84%,
        transparent 100%
      );
      mask-image: radial-gradient(
        circle at 52% 36%,
        rgba(0, 0, 0, 1) 28%,
        rgba(0, 0, 0, 0.95) 48%,
        rgba(0, 0, 0, 0.7) 68%,
        rgba(0, 0, 0, 0.28) 84%,
        transparent 100%
      );
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      background:
        radial-gradient(circle at 52% 30%, rgba(255, 212, 177, 0.12), transparent 24%),
        linear-gradient(
          180deg,
          rgba(22, 8, 5, 0.12) 0%,
          rgba(22, 8, 5, 0.08) 34%,
          rgba(18, 8, 6, 0.52) 60%,
          rgba(7, 4, 3, 0.94) 100%
        ),
        linear-gradient(
          90deg,
          rgba(16, 7, 5, 0.56) 0%,
          rgba(255, 178, 137, 0.02) 48%,
          rgba(16, 7, 5, 0.58) 100%
        );
    }

    .film-grain {
      position: absolute;
      inset: -40%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 320 320' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.12' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='320' height='320' filter='url(%23n)' opacity='0.7'/%3E%3C/svg%3E");
      background-size: 124px 124px;
      mix-blend-mode: overlay;
      animation: grainMove 900ms steps(2) infinite;
    }

    .soft-vignette {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(
          180deg,
          rgba(20, 8, 5, 0) 0%,
          rgba(20, 8, 5, 0.08) 36%,
          rgba(10, 5, 4, 0.72) 100%
        );
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      padding: 22px 18px 17px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      background: linear-gradient(
        145deg,
        rgba(17, 9, 7, 0.5),
        rgba(8, 5, 5, 0.42)
      );
      backdrop-filter: blur(14px) saturate(0.92);
      -webkit-backdrop-filter: blur(14px) saturate(0.92);
      box-shadow:
        0 24px 78px rgba(0, 0, 0, 0.46),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: cardAppear 900ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .name {
      margin: 0 0 11px;
      font-size: clamp(28px, 6.3vw, 40px);
      line-height: 1.06;
      font-weight: 500;
      letter-spacing: -0.055em;
    }

    .subtitle {
      margin: 0 0 23px;
      color: rgba(245, 241, 234, 0.72);
      font-size: clamp(16px, 3.9vw, 22px);
      line-height: 1.32;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .links {
      display: grid;
      gap: 11px;
    }

    .button {
      position: relative;
      display: block;
      overflow: hidden;
      padding: 16px 17px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 21px;
      color: #f5f1ea;
      text-decoration: none;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.085),
        rgba(255, 255, 255, 0.035)
      );
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 10px 24px rgba(0, 0, 0, 0.12);
      transition:
        transform 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        110deg,
        transparent,
        rgba(255, 255, 255, 0.1),
        transparent
      );
      transform: skewX(-18deg);
      transition: left 0.7s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.23);
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.12),
        rgba(255, 255, 255, 0.055)
      );
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }

    .button:hover::before {
      left: 130%;
    }

    .button-title {
      position: relative;
      z-index: 1;
      display: block;
      font-size: 19px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    .button-subtitle {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 7px;
      color: rgba(245, 241, 234, 0.57);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.11em;
    }

    .syntx-block {
      display: grid;
      gap: 10px;
      margin-top: 2px;
    }

    .syntx-note {
      margin: 4px 0 0;
      color: rgba(245, 241, 234, 0.6);
      font-size: 14px;
      line-height: 1.42;
      font-weight: 600;
    }

    .collab {
      margin-top: 23px;
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .collab-title {
      margin: 0 0 14px;
      color: rgba(245, 241, 234, 0.55);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .telegram {
      padding: 18px 17px;
      text-align: center;
      color: #1b100c;
      background: rgba(245, 241, 234, 0.94);
      border-color: rgba(245, 241, 234, 0.9);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .telegram:hover {
      color: #140c09;
      background: #ffffff;
      border-color: #ffffff;
    }

    .telegram .button-title {
      font-size: 21px;
      letter-spacing: -0.045em;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 20px;
      color: rgba(245, 241, 234, 0.44);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes grainMove {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(-3%, 2%);
      }

      50% {
        transform: translate(2%, -3%);
      }

      75% {
        transform: translate(3%, 3%);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    @media (max-width: 520px) {
      .page {
        min-height: 100svh;
        padding: 62svh 14px 16px;
      }

      .hero-photo {
        background: url("photo.jpg") 53% 4svh / auto 88svh no-repeat;
        filter: saturate(1) contrast(1.03) brightness(0.86);
        -webkit-mask-image: radial-gradient(
          circle at 52% 36%,
          rgba(0, 0, 0, 1) 27%,
          rgba(0, 0, 0, 0.95) 47%,
          rgba(0, 0, 0, 0.7) 67%,
          rgba(0, 0, 0, 0.28) 84%,
          transparent 100%
        );
        mask-image: radial-gradient(
          circle at 52% 36%,
          rgba(0, 0, 0, 1) 27%,
          rgba(0, 0, 0, 0.95) 47%,
          rgba(0, 0, 0, 0.7) 67%,
          rgba(0, 0, 0, 0.28) 84%,
          transparent 100%
        );
      }

      .film-grain {
        opacity: 0.2;
        background-size: 114px 114px;
      }

      .card {
        padding: 21px 18px 17px;
        border-radius: 30px;
      }

      .name {
        font-size: clamp(29px, 6.9vw, 38px);
      }

      .subtitle {
        margin-bottom: 22px;
      }

      .button {
        padding: 16px;
        border-radius: 21px;
      }

      .button-title {
        font-size: 18px;
      }

      .button-subtitle {
        font-size: 12px;
        letter-spacing: 0.1em;
      }
    }

    @media (max-width: 390px) {
      .page {
        padding-top: 63svh;
      }

      .hero-photo {
        background: url("photo.jpg") 54% 4svh / auto 86svh no-repeat;
      }

      .name {
        font-size: 29px;
      }

      .subtitle {
        font-size: 16px;
        margin-bottom: 21px;
      }

      .button-title {
        font-size: 17px;
      }

      .telegram .button-title {
        font-size: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .film-grain {
        animation: none;
      }

      .button::before {
        display: none;
      }

      .button {
        transition: none;
      }
    }
  </style>
</head>

<body>

    </section>
  </main>
</body>
</html>
