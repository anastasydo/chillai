<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чудинова Анастасия</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: #f5f1ea;
      background: #050607;
    }

    .page {
      min-height: 100vh;
      padding: 32px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(5, 6, 7, 0.2), rgba(5, 6, 7, 0.95)),
        linear-gradient(90deg, rgba(5, 6, 7, 0.92), rgba(5, 6, 7, 0.45), rgba(5, 6, 7, 0.86)),
        url("tempImagegckxIU.jpg") center / cover no-repeat;
      filter: saturate(0.85) contrast(1.08) brightness(0.72);
      transform: scale(1.03);
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 70% 45%, rgba(255, 255, 255, 0.08), transparent 32%),
        radial-gradient(circle at 30% 20%, rgba(77, 120, 160, 0.18), transparent 36%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 430px;
      position: relative;
      z-index: 1;
      padding: 28px 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 32px;
      background: rgba(9, 10, 12, 0.48);
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
    }

    .name {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.05;
      font-weight: 500;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 34px;
      color: rgba(245, 241, 234, 0.72);
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: 0.02em;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .button {
      display: block;
      padding: 18px 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 22px;
      color: #f5f1ea;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .button-title {
      display: block;
      font-size: 17px;
      font-weight: 500;
      line-height: 1.2;
    }

    .button-subtitle {
      display: block;
      margin-top: 4px;
      color: rgba(245, 241, 234, 0.62);
      font-size: 12px;
      line-height: 1.35;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .button-text {
      display: block;
      margin-top: 8px;
      color: rgba(245, 241, 234, 0.68);
      font-size: 13px;
      line-height: 1.45;
    }

    .collab {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .collab-title {
      margin: 0 0 12px;
      color: rgba(245, 241, 234, 0.64);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .telegram {
      text-align: center;
      background: #f5f1ea;
      color: #090a0c;
      border-color: #f5f1ea;
    }

    .telegram:hover {
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 class="name">Чудинова Анастасия</h1>

      <p class="subtitle">
        AI-режиссёр<br />
        выбери, куда тебе
      </p>

      <div class="links">
        <a class="button" href="https://t.me/chillaiai" target="_blank">
          <span class="button-title">Неро без истерик</span>
          <span class="button-subtitle">AI-контент Telegram</span>
        </a>

        <a class="button" href="https://syntx.ai/welcome/QNEO5ZuV" target="_blank">
          <span class="button-title">Syntx AI</span>
          <span class="button-text">
            Работаю с нейросетями здесь — регистрируйся по моей ссылке и получи 15% скидку по промокоду DONEURO.
          </span>
        </a>
      </div>

      <div class="collab">
        <p class="collab-title">Предложить сотрудничество</p>
        <a class="button telegram" href="https://t.me/makemenastya" target="_blank">
          <span class="button-title">Написать мне в Telegram</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
