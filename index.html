<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чудинова Анастасия</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      color: #f5f1ea;
      background: #1b0d09;
    }

    .page {
      position: relative;
      min-height: 100svh;
      padding: 56svh 16px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
      background: #1b0d09;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: -24px;
      z-index: -4;
      background:
        linear-gradient(
          180deg,
          rgba(18, 7, 5, 0.18) 0%,
          rgba(26, 10, 7, 0.28) 18%,
          rgba(30, 13, 8, 0.58) 52%,
          rgba(13, 7, 5, 0.94) 100%
        ),
        linear-gradient(
          90deg,
          rgba(39, 14, 8, 0.62) 0%,
          rgba(255, 178, 137, 0.05) 46%,
          rgba(28, 11, 7, 0.66) 100%
        ),
        radial-gradient(circle at 52% 18%, rgba(255, 174, 122, 0.18), transparent 30%),
        url("photo.jpg") center top / cover no-repeat;
      filter: saturate(0.92) contrast(1.04) brightness(0.72);
      transform: scale(1.03);
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 214, 176, 0.12), transparent 24%),
        radial-gradient(circle at 50% 42%, transparent 18%, rgba(42, 16, 10, 0.28) 60%, rgba(0, 0, 0, 0.82) 100%),
        linear-gradient(180deg, rgba(255, 214, 176, 0.03), rgba(0, 0, 0, 0.42));
      opacity: 0.98;
    }

    .film-grain {
      position: absolute;
      inset: -40%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.24;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 320 320' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.12' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='320' height='320' filter='url(%23n)' opacity='0.7'/%3E%3C/svg%3E");
      background-size: 124px 124px;
      mix-blend-mode: overlay;
      animation: grainMove 900ms steps(2) infinite;
    }

    .soft-vignette {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(20, 8, 5, 0) 0%, rgba(20, 8, 5, 0.12) 34%, rgba(15, 8, 6, 0.7) 100%);
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      padding: 24px 20px 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      background: linear-gradient(
        145deg,
        rgba(18, 10, 8, 0.54),
        rgba(8, 5, 5, 0.46)
      );
      backdrop-filter: blur(12px) saturate(0.88);
      -webkit-backdrop-filter: blur(12px) saturate(0.88);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: cardAppear 900ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .name {
      margin: 0 0 12px;
      font-size: clamp(30px, 7vw, 44px);
      line-height: 1.05;
      font-weight: 500;
      letter-spacing: -0.055em;
    }

    .subtitle {
      margin: 0 0 26px;
      color: rgba(245, 241, 234, 0.72);
      font-size: clamp(17px, 4.2vw, 24px);
      line-height: 1.3;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .button {
      position: relative;
      display: block;
      overflow: hidden;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 22px;
      color: #f5f1ea;
      text-decoration: none;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.09),
        rgba(255, 255, 255, 0.04)
      );
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 10px 26px rgba(0, 0, 0, 0.12);
      transition:
        transform 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        110deg,
        transparent,
        rgba(255, 255, 255, 0.11),
        transparent
      );
      transform: skewX(-18deg);
      transition: left 0.7s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.24);
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.12),
        rgba(255, 255, 255, 0.06)
      );
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }

    .button:hover::before {
      left: 130%;
    }

    .button-title {
      position: relative;
      z-index: 1;
      display: block;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    .button-subtitle {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 7px;
      color: rgba(245, 241, 234, 0.58);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .syntx-block {
      display: grid;
      gap: 10px;
    }

    .syntx-note {
      margin: 6px 0 0;
      color: rgba(245, 241, 234, 0.66);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 600;
    }

    .collab {
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.11);
    }

    .collab-title {
      margin: 0 0 16px;
      color: rgba(245, 241, 234, 0.58);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .telegram {
      padding: 20px 18px;
      text-align: center;
      color: #1b100c;
      background: rgba(245, 241, 234, 0.93);
      border-color: rgba(245, 241, 234, 0.9);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .telegram:hover {
      color: #140c09;
      background: #ffffff;
      border-color: #ffffff;
    }

    .telegram .button-title {
      font-size: 22px;
      letter-spacing: -0.045em;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 22px;
      color: rgba(245, 241, 234, 0.46);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes grainMove {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(-3%, 2%);
      }

      50% {
        transform: translate(2%, -3%);
      }

      75% {
        transform: translate(3%, 3%);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    @media (max-width: 520px) {
      .page {
        min-height: 100svh;
        padding: 58svh 14px 16px;
      }

      .page::before {
        background:
          linear-gradient(
            180deg,
            rgba(18, 7, 5, 0.22) 0%,
            rgba(28, 11, 7, 0.34) 20%,
            rgba(30, 13, 8, 0.62) 54%,
            rgba(13, 7, 5, 0.96) 100%
          ),
          linear-gradient(
            90deg,
            rgba(39, 14, 8, 0.62) 0%,
            rgba(255, 178, 137, 0.04) 46%,
            rgba(28, 11, 7, 0.66) 100%
          ),
          radial-gradient(circle at 52% 18%, rgba(255, 174, 122, 0.16), transparent 30%),
          url("photo.jpg") center top / cover no-repeat;
        filter: saturate(0.92) contrast(1.05) brightness(0.69);
        transform: scale(1.02);
      }

      .film-grain {
        opacity: 0.26;
        background-size: 114px 114px;
      }

      .card {
        padding: 22px 18px 18px;
        border-radius: 30px;
      }

      .button {
        border-radius: 21px;
      }
    }

    @media (max-width: 390px) {
      .page {
        padding-top: 60svh;
      }

      .page::before {
        background:
          linear-gradient(
            180deg,
            rgba(18, 7, 5, 0.24) 0%,
            rgba(28, 11, 7, 0.36) 20%,
            rgba(31, 13, 8, 0.64) 52%,
            rgba(13, 7, 5, 0.97) 100%
          ),
          linear-gradient(
            90deg,
            rgba(39, 14, 8, 0.64) 0%,
            rgba(255, 178, 137, 0.03) 42%,
            rgba(28, 11, 7, 0.68) 100%
          ),
          radial-gradient(circle at 52% 18%, rgba(255, 174, 122, 0.14), transparent 30%),
          url("photo.jpg") center top / cover no-repeat;
      }

      .name {
        font-size: 31px;
      }

      .subtitle {
        margin-bottom: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .film-grain {
        animation: none;
      }

      .button::before {
        display: none;
      }

      .button {
        transition: none;
      }
    }
  </style>
</head>

<body>

  </main>
</body>
</html>
