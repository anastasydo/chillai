<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чудинова Анастасия</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      color: #f5f1ea;
      background: #030405;
    }

    .page {
      position: relative;
      min-height: 100svh;
      padding: 54svh 16px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
      background: #030405;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: -24px;
      z-index: -4;
      background:
        linear-gradient(
          180deg,
          rgba(3, 4, 5, 0.20) 0%,
          rgba(3, 4, 5, 0.36) 20%,
          rgba(3, 4, 5, 0.62) 52%,
          rgba(3, 4, 5, 0.92) 100%
        ),
        linear-gradient(
          90deg,
          rgba(3, 4, 5, 0.82) 0%,
          rgba(3, 4, 5, 0.26) 42%,
          rgba(3, 4, 5, 0.68) 100%
        ),
        radial-gradient(circle at 52% 18%, rgba(26, 39, 64, 0.22), transparent 28%),
        url("tempImagegckxIU.jpg") center top / cover no-repeat;
      filter: saturate(0.86) contrast(1.08) brightness(0.68);
      transform: scale(1.025);
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 236, 212, 0.08), transparent 26%),
        radial-gradient(circle at 50% 46%, transparent 20%, rgba(3, 4, 5, 0.42) 58%, rgba(0, 0, 0, 0.82) 100%),
        linear-gradient(180deg, rgba(255, 228, 196, 0.02), rgba(0, 0, 0, 0.46));
      opacity: 0.98;
    }

    .film-grain {
      position: absolute;
      inset: -40%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 320 320' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.05' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='320' height='320' filter='url(%23n)' opacity='0.62'/%3E%3C/svg%3E");
      background-size: 130px 130px;
      mix-blend-mode: overlay;
      animation: grainMove 900ms steps(2) infinite;
    }

    .soft-haze {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(3, 4, 5, 0) 0%, rgba(3, 4, 5, 0.12) 28%, rgba(3, 4, 5, 0.62) 100%);
      mix-blend-mode: normal;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      padding: 24px 20px 18px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 30px;
      background: linear-gradient(
        145deg,
        rgba(18, 18, 20, 0.54),
        rgba(3, 4, 5, 0.46)
      );
      backdrop-filter: blur(16px) saturate(0.9);
      -webkit-backdrop-filter: blur(16px) saturate(0.9);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.46),
        inset 0 1px 0 rgba(255, 255, 255, 0.055);
      animation: cardAppear 900ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .name {
      margin: 0 0 12px;
      font-size: clamp(30px, 7vw, 44px);
      line-height: 1.05;
      font-weight: 500;
      letter-spacing: -0.055em;
    }

    .subtitle {
      margin: 0 0 26px;
      color: rgba(245, 241, 234, 0.7);
      font-size: clamp(17px, 4.2vw, 24px);
      line-height: 1.3;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .button {
      position: relative;
      display: block;
      overflow: hidden;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 22px;
      color: #f5f1ea;
      text-decoration: none;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.095),
        rgba(255, 255, 255, 0.045)
      );
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.045),
        0 10px 26px rgba(0, 0, 0, 0.12);
      transition:
        transform 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        110deg,
        transparent,
        rgba(255, 255, 255, 0.12),
        transparent
      );
      transform: skewX(-18deg);
      transition: left 0.7s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.26);
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.13),
        rgba(255, 255, 255, 0.065)
      );
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.075);
    }

    .button:hover::before {
      left: 130%;
    }

    .button-title {
      position: relative;
      z-index: 1;
      display: block;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    .button-subtitle {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 7px;
      color: rgba(245, 241, 234, 0.58);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .syntx-block {
      display: grid;
      gap: 10px;
    }

    .syntx-note {
      margin: 6px 0 0;
      color: rgba(245, 241, 234, 0.66);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 600;
    }

    .collab {
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .collab-title {
      margin: 0 0 16px;
      color: rgba(245, 241, 234, 0.58);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .telegram {
      padding: 20px 18px;
      text-align: center;
      color: #070809;
      background: rgba(245, 241, 234, 0.92);
      border-color: rgba(245, 241, 234, 0.9);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .telegram:hover {
      color: #070809;
      background: #ffffff;
      border-color: #ffffff;
    }

    .telegram .button-title {
      font-size: 22px;
      letter-spacing: -0.045em;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 22px;
      color: rgba(245, 241, 234, 0.46);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes grainMove {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(-3%, 2%);
      }

      50% {
        transform: translate(2%, -3%);
      }

      75% {
        transform: translate(3%, 3%);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    @media (max-width: 520px) {
      .page {
        min-height: 100svh;
        padding: 50svh 14px 16px;
      }

      .page::before {
        background:
          linear-gradient(
            180deg,
            rgba(3, 4, 5, 0.24) 0%,
            rgba(3, 4, 5, 0.40) 22%,
            rgba(3, 4, 5, 0.64) 54%,
            rgba(3, 4, 5, 0.96) 100%
          ),
          linear-gradient(
            90deg,
            rgba(3, 4, 5, 0.80) 0%,
            rgba(3, 4, 5, 0.18) 46%,
            rgba(3, 4, 5, 0.70) 100%
          ),
          url("tempImagegckxIU.jpg") center top / cover no-repeat;
        filter: saturate(0.86) contrast(1.08) brightness(0.64);
        transform: scale(1.03);
      }

      .film-grain {
        opacity: 0.2;
        background-size: 118px 118px;
      }

      .card {
        padding: 22px 18px 18px;
        border-radius: 30px;
      }

      .button {
        border-radius: 21px;
      }
    }

    @media (max-width: 390px) {
      .page {
        padding-top: 48svh;
      }

      .page::before {
        background:
          linear-gradient(
            180deg,
            rgba(3, 4, 5, 0.24) 0%,
            rgba(3, 4, 5, 0.40) 20%,
            rgba(3, 4, 5, 0.66) 52%,
            rgba(3, 4, 5, 0.97) 100%
          ),
          linear-gradient(
            90deg,
            rgba(3, 4, 5, 0.82) 0%,
            rgba(3, 4, 5, 0.16) 42%,
            rgba(3, 4, 5, 0.68) 100%
          ),
          url("tempImagegckxIU.jpg") center top / cover no-repeat;
      }

      .name {
        font-size: 31px;
      }

      .subtitle {
        margin-bottom: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .film-grain {
        animation: none;
      }

      .button::before {
        display: none;
      }

      .button {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="film-grain"></div>

    <section class="card" aria-label="Ссылки Чудиновой Анастасии">
      <h1 class="name">Чудинова Анастасия</h1>

      <p class="subtitle">

      <div class="links">

        </div>
      </div>

      <div class="collab">

      </div>

      <footer class="footer">
        <span>Екатеринбург</span>

      </footer>
    </section>
  </main>
</body>
</html>
