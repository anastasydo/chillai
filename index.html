<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чудинова Анастасия</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      color: #f5f1ea;
      background: #030405;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 32px 20px 26px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: -24px;
      z-index: -3;
      background:
        linear-gradient(180deg, rgba(3, 4, 5, 0.06) 0%, rgba(3, 4, 5, 0.18) 42%, rgba(3, 4, 5, 0.82) 100%),
        linear-gradient(90deg, rgba(3, 4, 5, 0.5), rgba(3, 4, 5, 0.08), rgba(3, 4, 5, 0.62)),
        url("tempImagegckxIU.jpg") center top / cover no-repeat;
      filter: saturate(0.96) contrast(1.07) brightness(0.9);
      transform: scale(1.025);
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 48% 18%, rgba(255, 255, 255, 0.08), transparent 24%),
        radial-gradient(circle at center, transparent 38%, rgba(0, 0, 0, 0.74) 100%);
      opacity: 0.72;
    }

    .film-grain {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='160' height='160' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      mix-blend-mode: soft-light;
    }

    .card {
      width: 100%;
      max-width: 430px;
      padding: 26px 22px 20px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 32px;
      background: linear-gradient(
        145deg,
        rgba(20, 21, 24, 0.58),
        rgba(5, 6, 8, 0.52)
      );
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.48),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: cardAppear 900ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .name {
      margin: 0 0 14px;
      font-size: clamp(30px, 7vw, 44px);
      line-height: 1.05;
      font-weight: 500;
      letter-spacing: -0.055em;
    }

    .subtitle {
      margin: 0 0 30px;
      color: rgba(245, 241, 234, 0.72);
      font-size: clamp(17px, 4.2vw, 24px);
      line-height: 1.3;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .button {
      position: relative;
      display: block;
      overflow: hidden;
      padding: 18px 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 22px;
      color: #f5f1ea;
      text-decoration: none;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.11),
        rgba(255, 255, 255, 0.06)
      );
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition:
        transform 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        110deg,
        transparent,
        rgba(255, 255, 255, 0.14),
        transparent
      );
      transform: skewX(-18deg);
      transition: left 0.7s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.3);
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.15),
        rgba(255, 255, 255, 0.08)
      );
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .button:hover::before {
      left: 130%;
    }

    .button-title {
      position: relative;
      z-index: 1;
      display: block;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    .button-subtitle {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 7px;
      color: rgba(245, 241, 234, 0.62);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .syntx-block {
      display: grid;
      gap: 10px;
    }

    .syntx-note {
      margin: 6px 0 0;
      color: rgba(245, 241, 234, 0.7);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 600;
    }

    .collab {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.14);
    }

    .collab-title {
      margin: 0 0 16px;
      color: rgba(245, 241, 234, 0.62);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .telegram {
      padding: 20px 18px;
      text-align: center;
      color: #070809;
      background: #f5f1ea;
      border-color: #f5f1ea;
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .telegram:hover {
      color: #070809;
      background: #ffffff;
      border-color: #ffffff;
    }

    .telegram .button-title {
      font-size: 22px;
      letter-spacing: -0.045em;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 22px;
      color: rgba(245, 241, 234, 0.48);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @media (max-width: 520px) {
      .page {
        min-height: 100svh;
        padding: 22px 14px 18px;
        align-items: flex-end;
      }

      .page::before {
        background:
          linear-gradient(180deg, rgba(3, 4, 5, 0.04) 0%, rgba(3, 4, 5, 0.12) 38%, rgba(3, 4, 5, 0.86) 100%),
          linear-gradient(90deg, rgba(3, 4, 5, 0.42), rgba(3, 4, 5, 0.06), rgba(3, 4, 5, 0.52)),
          url("tempImagegckxIU.jpg") center 18% / cover no-repeat;
      }

      .card {
        padding: 24px 18px 18px;
        border-radius: 30px;
      }

      .button {
        border-radius: 21px;
      }
    }

    @media (max-width: 390px) {
      .page::before {
        background:
          linear-gradient(180deg, rgba(3, 4, 5, 0.04) 0%, rgba(3, 4, 5, 0.12) 36%, rgba(3, 4, 5, 0.88) 100%),
          linear-gradient(90deg, rgba(3, 4, 5, 0.38), rgba(3, 4, 5, 0.04), rgba(3, 4, 5, 0.48)),
          url("tempImagegckxIU.jpg") center 12% / cover no-repeat;
      }

      .name {
        font-size: 31px;
      }

      .subtitle {
        margin-bottom: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card {
        animation: none;
      }

      .button::before {
        display: none;
      }

      .button {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="film-grain"></div>

    <section class="card" aria-label="Ссылки Чудиновой Анастасии">
      <h1 class="name">Чудинова Анастасия</h1>

  </main>
</body>
</html>
